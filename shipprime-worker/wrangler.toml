name = "shipprime-worker"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
# Public, safe to commit — ShipPrime's API host.
SHIPPRIME_BASE_URL = "https://api.shipprime.live"

# SHIPPRIME_API_TOKEN (per-shop bearer token from ShipPrime seller portal:
# Profile -> API Setup) and APP_SHARED_KEY (a secret only our own frontend
# knows, checked on every request so randoms can't hit this worker and book
# real courier shipments) must NOT be set in this file (it's committed to git).
# For local development, put them in `.dev.vars` (gitignored):
#   SHIPPRIME_API_TOKEN=your_token_here
#   APP_SHARED_KEY=some_random_string
# For production, set them with:
#   wrangler secret put SHIPPRIME_API_TOKEN
#   wrangler secret put APP_SHARED_KEY
